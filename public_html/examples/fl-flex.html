<!DOCTYPE html>
<html>
        <head>
                <title>Flexo 2 — fl-flex-*</title>
                <meta charset="UTF-8">
                <meta name="description" content="Flexo 2 — Classi flex proportional">
                <meta name="viewport" content="width=device-width, initial-scale=1">
                <meta name="robots" content="noindex, nofollow">
                <meta name="apple-mobile-web-app-capable" content="yes">
                <meta name="mobile-web-app-capable" content="yes">
                <link rel="stylesheet" type="text/css" href="../../dist/flexo.min.css" />
                <style>
                        body,html
                        {
                            height: 100%;
                        }
                        .row
                        {
                            margin-bottom: 30px;
                        }
                        .fl-box
                        {
                            height: 80px;
                        }
                        div
                        {
                            outline: 1px solid #000
                        }
                </style>
        </head>
        <body id="wireframe" class="fill border-2">

                <!-- ===== fl-sm-flex-* (base) ===== -->
                <h3 style="padding:10px">fl-sm-flex-* (proporzioni flex base)</h3>

                <div class="container fluid">
                        <div class="row fl-sm-gap-16">
                                <div class="fl-box fl-sm-flex-1"></div>
                                <div class="fl-box fl-sm-flex-1"></div>
                                <div class="fl-box fl-sm-flex-1"></div>
                        </div>
                        <div class="row fl-sm-gap-16">
                                <div class="fl-box fl-sm-flex-1"></div>
                                <div class="fl-box fl-sm-flex-2"></div>
                                <div class="fl-box fl-sm-flex-1"></div>
                        </div>
                        <div class="row fl-sm-gap-16">
                                <div class="fl-box fl-sm-flex-1"></div>
                                <div class="fl-box fl-sm-flex-3"></div>
                                <div class="fl-box fl-sm-flex-2"></div>
                        </div>
                        <div class="row fl-sm-gap-16">
                                <div class="fl-box fl-sm-flex-1"></div>
                                <div class="fl-box fl-sm-flex-4"></div>
                        </div>
                </div>

                <!-- ===== fl-flex-* responsive ===== -->
                <h3 style="padding:10px">fl-flex-* responsive (cambio proporzioni per breakpoint)</h3>

                <div class="container fluid">
                        <div class="row fl-sm-gap-16">
                                <div class="fl-box fl-sm-flex-1 fl-md-flex-2 fl-lg-flex-4"></div>
                                <div class="fl-box fl-sm-flex-1 fl-md-flex-1 fl-lg-flex-1"></div>
                                <div class="fl-box fl-sm-flex-1 fl-md-flex-1 fl-lg-flex-1"></div>
                        </div>
                </div>

                <!-- ===== flex + breakpoint width ===== -->
                <h3 style="padding:10px">Mix: fl-sm-flex-* + fl-mg-* (flex su mobile, unit su large)</h3>

                <div class="container fluid">
                        <div class="row fl-sm-gap-16">
                                <div class="fl-box fl-sm-flex-1 fl-mg-5"></div>
                                <div class="fl-box fl-sm-flex-1 fl-mg-flex-3"></div>
                                <div class="fl-box fl-sm-flex-1 fl-mg-flex-4"></div>
                        </div>
                </div>

                <!-- ===== flex con gap variabile ===== -->
                <h3 style="padding:10px">fl-flex-* con gap crescente</h3>

                <div class="container fluid">
                        <div class="row fl-gap-0">
                                <div class="fl-box fl-sm-flex-1"></div>
                                <div class="fl-box fl-sm-flex-2"></div>
                                <div class="fl-box fl-sm-flex-1"></div>
                        </div>
                        <div class="row fl-gap-16">
                                <div class="fl-box fl-sm-flex-1"></div>
                                <div class="fl-box fl-sm-flex-2"></div>
                                <div class="fl-box fl-sm-flex-1"></div>
                        </div>
                        <div class="row fl-gap-40">
                                <div class="fl-box fl-sm-flex-1"></div>
                                <div class="fl-box fl-sm-flex-2"></div>
                                <div class="fl-box fl-sm-flex-1"></div>
                        </div>
                </div>

        </body>
</html>
