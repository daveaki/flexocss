<!DOCTYPE html>
<html>
	<head>
		<title>Flexo 2 — Wireframe fill</title>
		<meta charset="UTF-8">
		<meta name="description" content="Flexo 2 — Wireframe modalità fill">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="robots" content="noindex, nofollow">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="mobile-web-app-capable" content="yes">
		<link rel="stylesheet" type="text/css" href="../assets/dist/css/flexo.min.css" />
		<style>
			body,html
			{
				height: 100%;
			}
			.row
			{
				margin-bottom: 30px;
			}
			.fl-box
			{
				height: 80px;
			}
		</style>
	</head>
	<body id="wireframe" class="fill">

		<div class="container fluid">
			<div class="row fl-sm-gap-16">
				<div class="fl-box fl-sm-16"></div>
			</div>
			<div class="row fl-sm-gap-16">
				<div class="fl-box fl-sm-8"></div>
				<div class="fl-box fl-sm-8"></div>
			</div>
			<div class="row fl-sm-gap-16">
				<div class="fl-box fl-sm-4"></div>
				<div class="fl-box fl-sm-4"></div>
				<div class="fl-box fl-sm-4"></div>
				<div class="fl-box fl-sm-4"></div>
			</div>
			<div class="row fl-sm-gap-16">
				<div class="fl-box fl-sm-6"></div>
				<div class="fl-box fl-sm-10"></div>
			</div>
			<div class="row fl-sm-gap-16">
				<div class="fl-box fl-sm-4"></div>
				<div class="fl-box fl-sm-12">
					<div class="row fl-sm-gap-8">
						<div class="fl-box fl-sm-8"></div>
						<div class="fl-box fl-sm-8"></div>
					</div>
				</div>
			</div>
		</div>

	</body>
</html>
