<!DOCTYPE html>
<html>
        <head>
                <title>Flexo 2 — fl-*</title>
                <meta charset="UTF-8">
                <meta name="description" content="Flexo 2 — Classi unprefixed fl-*">
                <meta name="viewport" content="width=device-width, initial-scale=1">
                <meta name="robots" content="noindex, nofollow">
                <meta name="apple-mobile-web-app-capable" content="yes">
                <meta name="mobile-web-app-capable" content="yes">
                <link rel="stylesheet" type="text/css" href="../../dist/flexo.min.css" />
                <style>
                        body,html
                        {
                            height: 100%;
                        }
                        .row
                        {
                            margin-bottom: 30px;
                        }
                        .fl-box
                        {
                            height: 80px;
                        }
                        div
                        {
                            outline: 1px solid #000
                        }
                </style>
        </head>
        <body id="wireframe" class="fill border-2">

                <!-- ===== WIDTH: fl-1 .. fl-16 ===== -->
                <h3 style="padding:10px">fl-* (width units)</h3>

                <div class="container fluid">
                        <div class="row fl-gap-16">
                                <div class="fl-box fl-16"></div>
                        </div>
                        <div class="row fl-gap-16">
                                <div class="fl-box fl-8"></div>
                                <div class="fl-box fl-8"></div>
                        </div>
                        <div class="row fl-gap-16">
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                        </div>
                        <div class="row fl-gap-16">
                                <div class="fl-box fl-2"></div>
                                <div class="fl-box fl-6"></div>
                                <div class="fl-box fl-3"></div>
                                <div class="fl-box fl-5"></div>
                        </div>
                        <div class="row fl-gap-16">
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                                <div class="fl-box fl-1"></div>
                        </div>
                </div>

                <!-- ===== FL-AUTO ===== -->
                <h3 style="padding:10px">fl-auto</h3>

                <div class="container fluid">
                        <div class="row fl-gap-16">
                                <div class="fl-box fl-auto"></div>
                                <div class="fl-box fl-auto"></div>
                                <div class="fl-box fl-auto"></div>
                        </div>
                        <div class="row fl-gap-16">
                                <div class="fl-box fl-auto"></div>
                                <div class="fl-box" style="width:200px"></div>
                                <div class="fl-box fl-auto"></div>
                        </div>
                </div>

                <!-- ===== GAP: fl-gap-* ===== -->
                <h3 style="padding:10px">fl-gap-*</h3>

                <div class="container fluid">
                        <div class="row fl-gap-0">
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                        </div>
                        <div class="row fl-gap-16">
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                        </div>
                        <div class="row fl-gap-32">
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                                <div class="fl-box fl-4"></div>
                        </div>
                        <div class="row fl-gap-48">
                                <div class="fl-box fl-8"></div>
                                <div class="fl-box fl-8"></div>
                        </div>
                </div>

        </body>
</html>
